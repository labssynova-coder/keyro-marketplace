<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyro — Documentation API</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0E14;--surface:#14171F;--card:#1A1E28;--card-hover:#1F2433;
  --accent:#E89A2D;--accent-hover:#F5B04E;--accent-glow:rgba(232,154,45,.12);
  --fg:#F0F0F2;--fg-secondary:#B0B6C3;--muted:#6B7280;--border:#252A36;--border-light:#2D3344;
  --success:#34D399;--danger:#F87171;--info:#60A5FA;--warn:#FBBF24;
  --radius-xl:20px;--radius-lg:14px;--radius-md:10px;--radius-sm:7px;
  --font-heading:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--fg);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
h1,h2,h3,h4,h5,h6{font-family:var(--font-heading);font-weight:600}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* BANNER */
.demo-banner{
  background:linear-gradient(135deg,rgba(232,154,45,.15),rgba(232,154,45,.05));
  border-bottom:1px solid var(--accent);
  color:var(--accent-hover);font-size:.8rem;font-weight:500;
  text-align:center;padding:.5rem 1rem;letter-spacing:.02em;
  position:sticky;top:0;z-index:100;
}
.demo-banner span{margin-right:.5rem}

/* HEADER */
.api-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:1.25rem 2rem;display:flex;align-items:center;gap:1.5rem;flex-shrink:0;
}
.api-header .logo{font-family:var(--font-heading);font-size:1.5rem;font-weight:700;color:var(--fg)}
.api-header .logo em{font-style:normal;color:var(--accent)}
.api-header .subtitle{color:var(--fg-secondary);font-size:.85rem;margin-left:.5rem}
.search-box{
  margin-left:auto;position:relative;width:320px;
}
.search-box input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:.5rem 1rem .5rem 2.2rem;
  color:var(--fg);font-size:.85rem;outline:none;transition:border-color .2s;
}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--muted)}
.search-box svg{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted)}

/* LAYOUT */
.api-layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.api-sidebar{
  width:280px;min-width:280px;background:var(--surface);
  border-right:1px solid var(--border);overflow-y:auto;
  padding:1rem 0;display:flex;flex-direction:column;gap:.25rem;
  transition:transform .3s ease;
}
.sidebar-group{margin-bottom:.15rem}
.sidebar-group-title{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem 1.25rem;cursor:pointer;font-family:var(--font-heading);
  font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:var(--fg-secondary);transition:color .2s;user-select:none;
}
.sidebar-group-title:hover{color:var(--fg)}
.sidebar-group-title .chevron{transition:transform .2s;font-size:.65rem}
.sidebar-group-title.collapsed .chevron{transform:rotate(-90deg)}
.sidebar-group-items{overflow:hidden;transition:max-height .3s ease}
.sidebar-group-items.collapsed{max-height:0!important}
.sidebar-item{
  display:flex;align-items:center;gap:.5rem;
  padding:.35rem 1.25rem .35rem 1.5rem;cursor:pointer;
  font-size:.8rem;color:var(--fg-secondary);transition:all .15s;
  border-left:2px solid transparent;
}
.sidebar-item:hover{background:var(--card);color:var(--fg)}
.sidebar-item.active{background:var(--accent-glow);color:var(--accent-hover);border-left-color:var(--accent)}
.sidebar-item .method-badge{font-size:.6rem;font-weight:700;min-width:38px;text-align:center;padding:1px 5px;border-radius:3px;letter-spacing:.04em}
.sidebar-item .ep-path{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MAIN */
.api-main{flex:1;overflow-y:auto;padding:2rem 2.5rem 4rem}

/* GROUP VIEW */
.group-header{
  font-family:var(--font-heading);font-size:1.6rem;font-weight:700;
  margin-bottom:.3rem;color:var(--fg);
}
.group-desc{color:var(--fg-secondary);font-size:.9rem;margin-bottom:1.5rem}
.endpoint-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);
  margin-bottom:.75rem;overflow:hidden;transition:border-color .2s;
}
.endpoint-card:hover{border-color:var(--border-light)}
.ep-header{
  display:flex;align-items:center;gap:.75rem;padding:.85rem 1.2rem;
  cursor:pointer;transition:background .15s;
}
.ep-header:hover{background:var(--card-hover)}
.ep-method{
  font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:4px;
  letter-spacing:.04em;min-width:56px;text-align:center;font-family:var(--font-heading);
}
.ep-method.GET{background:rgba(96,165,250,.15);color:#60A5FA}
.ep-method.POST{background:rgba(52,211,153,.15);color:#34D399}
.ep-method.PUT{background:rgba(251,191,36,.15);color:#FBBF24}
.ep-method.DELETE{background:rgba(248,113,113,.15);color:#F87171}
.ep-path{font-family:'Space Grotesk',monospace;font-size:.85rem;color:var(--fg);font-weight:500}
.ep-path .param{color:var(--accent);font-style:italic}
.ep-auth{
  margin-left:auto;font-size:.7rem;padding:2px 8px;border-radius:3px;
  background:rgba(232,154,45,.1);color:var(--accent);font-weight:500;
}
.ep-auth.admin{background:rgba(248,113,113,.12);color:var(--danger)}
.ep-auth.disabled{background:rgba(107,114,128,.15);color:var(--muted);text-decoration:line-through}
.ep-desc-brief{font-size:.78rem;color:var(--muted);margin-left:.5rem}
.ep-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--border)}
.ep-body.open{display:block}
.ep-section{margin-top:1rem}
.ep-section-title{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.5rem;font-family:var(--font-heading)}
.ep-desc{font-size:.85rem;color:var(--fg-secondary);line-height:1.6}
.ep-auth-detail{
  display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;
  padding:3px 10px;border-radius:var(--radius-sm);font-weight:500;
}
.ep-auth-detail.required{background:rgba(232,154,45,.12);color:var(--accent)}
.ep-auth-detail.admin{background:rgba(248,113,113,.12);color:var(--danger)}
.ep-auth-detail.none{background:rgba(107,114,128,.12);color:var(--muted)}

/* CODE BLOCKS */
.code-block{
  background:#0D1117;border:1px solid var(--border);border-radius:var(--radius-sm);
  overflow:hidden;
}
.code-block-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.4rem .8rem;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);
}
.code-block-header span{font-size:.7rem;color:var(--muted);font-family:var(--font-heading);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.copy-btn{
  background:none;border:1px solid var(--border);border-radius:4px;
  color:var(--muted);font-size:.7rem;padding:2px 8px;cursor:pointer;
  transition:all .15s;font-family:var(--font-body);
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.code-block pre{
  padding:.75rem 1rem;margin:0;overflow-x:auto;font-size:.78rem;line-height:1.65;
  color:#E6EDF3;font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
}
.json-key{color:#79C0FF}
.json-string{color:#A5D6FF}
.json-number{color:#79C0FF}
.json-bool{color:#FF7B72}
.json-null{color:#FF7B72}
.json-bracket{color:#8B949E}

/* PARAMS TABLE */
.params-table{width:100%;border-collapse:collapse;font-size:.8rem}
.params-table th{
  text-align:left;padding:.45rem .7rem;background:rgba(255,255,255,.03);
  color:var(--muted);font-size:.7rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;border-bottom:1px solid var(--border);
}
.params-table td{
  padding:.45rem .7rem;border-bottom:1px solid var(--border);color:var(--fg-secondary);
}
.params-table td:first-child{color:var(--fg);font-family:var(--font-heading);font-weight:500}
.param-type{color:var(--info);font-size:.72rem;font-weight:500}
.param-required{color:var(--danger);font-size:.7rem;font-weight:600}
.param-optional{color:var(--muted);font-size:.7rem}

/* MOBILE */
.mobile-menu-btn{
  display:none;background:none;border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--fg);padding:.4rem .6rem;
  cursor:pointer;font-size:1rem;margin-right:.75rem;
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}

@media(max-width:768px){
  .mobile-menu-btn{display:inline-flex}
  .api-sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:95;
    transform:translateX(-100%);
  }
  .api-sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .search-box{width:100%;margin-top:.75rem}
  .api-header{flex-wrap:wrap;padding:1rem}
  .api-main{padding:1.25rem}
  .group-header{font-size:1.3rem}
}

/* STATUS BADGES */
.status-badge{
  display:inline-block;font-size:.72rem;font-weight:600;padding:2px 8px;
  border-radius:4px;font-family:var(--font-heading);
}
.status-2xx{background:rgba(52,211,153,.12);color:var(--success)}
.status-4xx{background:rgba(248,113,113,.12);color:var(--danger)}

/* WELCOME */
.welcome-section{text-align:center;padding:3rem 1rem}
.welcome-section h2{font-family:var(--font-heading);font-size:2rem;margin-bottom:.5rem}
.welcome-section p{color:var(--fg-secondary);font-size:.95rem;max-width:600px;margin:0 auto .5rem}
.welcome-stats{
  display:flex;gap:1.5rem;justify-content:center;margin-top:2rem;flex-wrap:wrap;
}
.welcome-stat{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:1.25rem 1.75rem;text-align:center;min-width:120px;
}
.welcome-stat .num{font-family:var(--font-heading);font-size:1.8rem;font-weight:700;color:var(--accent)}
.welcome-stat .label{font-size:.75rem;color:var(--muted);margin-top:.2rem}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.endpoint-card{animation:fadeIn .2s ease}
</style>
</head>
<body>

<div class="demo-banner">
  <span>&#9733;</span> Demo &mdash; Documentation API &middot; Aucune requ&ecirc;te r&eacute;elle n'est effectu&eacute;e
</div>

<header class="api-header">
  <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>

  <span class="subtitle">v1 &middot; REST</span>

let activeGroup = null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function methodColor(m){
  return {GET:'#60A5FA',POST:'#34D399',PUT:'#FBBF24',DELETE:'#F87171'}[m]||'#B0B6C3';
}
function authBadge(auth){
  if(auth==='Admin') return '<span class="ep-auth admin">Admin</span>';
  if(auth==='Requise') return '<span class="ep-auth">Auth</span>';
  if(auth==='D&eacute;sactiv&eacute;'||auth==='Disabled') return '<span class="ep-auth disabled">Disabled</span>';
  return '';
}
function authDetailBadge(auth){
  if(auth==='Admin') return '<span class="ep-auth-detail admin">&#128274; Admin requis</span>';
  if(auth==='Requise') return '<span class="ep-auth-detail required">&#128274; Authentification requise</span>';
  if(auth==='Propri&eacute;taire ou Admin') return '<span class="ep-auth-detail required">&#128274; Propri&eacute;taire ou Admin</span>';
  if(auth==='Webhook') return '<span class="ep-auth-detail admin">&#128276; Webhook</span>';
  if(auth==='Cookie') return '<span class="ep-auth-detail required">&#127850; Cookie refreshToken</span>';
  return '<span class="ep-auth-detail none">&#128275; Aucune authentification</span>';
}
function statusBadge(s){
  const cls = s<300?'status-2xx':'status-4xx';
  return `<span class="status-badge ${cls}">${s}</span>`;
}
function escapeHtml(t){
  const d=document.createElement('div');d.textContent=t;return d.innerHTML;
}
function syntaxHighlight(json){
  let s = JSON.stringify(json,null,2);
  s = escapeHtml(s);
  s = s.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(m){
    let cls='json-number';
    if(/^"/.test(m)){if(/:$/.test(m)){cls='json-key'}else{cls='json-string'}}
    else if(/true|false/.test(m)){cls='json-bool'}
    else if(/null/.test(m)){cls='json-null'}
    return '<span class="'+cls+'">'+m+'</span>';
  });
  return s;
}
function paramRows(params,showRequired){
  if(!params||!params.length) return '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:.7rem">Aucun param&egrirc;tre</td></tr>';
  return params.map(p=>{
    const req = showRequired ? (p.required ? '<span class="param-required">requis</span>' : '<span class="param-optional">optionnel</span>') : '';
    return `<tr><td>${p.name}</td><td><span class="param-type">${p.type}</span></td>${showRequired?`<td>${req}</td>`:''}<td>${p.desc||''}</td></tr>`;
  }).join('');
}
function copyCode(btn){
  const pre=btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(()=>{
    btn.textContent='Copi&eacute; !';
    setTimeout(()=>btn.textContent='Copier',1500);
  });
}

// ─── RENDER SIDEBAR ──────────────────────────────────────────────────────────
function renderSidebar(filter=''){
  const sb=document.getElementById('sidebar');
  const f=filter.toLowerCase();
  let html='';
  let totalEndpoints=0;
  groups.forEach(g=>{
    const filtered = g.endpoints.filter(ep=>{
      if(!f) return true;
      return (ep.path.toLowerCase().includes(f) || ep.desc.toLowerCase().includes(f) || ep.method.toLowerCase().includes(f) || g.label.toLowerCase().includes(f));
    });
    if(!filtered.length) return;
    totalEndpoints += filtered.length;
    const collapsed = collapsedGroups[g.id];
    html+=`<div class="sidebar-group">
      <div class="sidebar-group-title${collapsed?' collapsed':''}" onclick="toggleGroup('${g.id}')">
        ${g.label} <span class="chevron">&#9662;</span>
      </div>
      <div class="sidebar-group-items${collapsed?' collapsed':''}" style="max-height:${collapsed?0:filtered.length*38}px">
        ${filtered.map(ep=>{
          const epId=g.id+'--'+ep.method+ep.path.replace(/[:/]/g,'_');
          const isActive = activeEndpoint===epId;
          return `<div class="sidebar-item${isActive?' active':''}" onclick="selectEndpoint('${g.id}','${epId}')">
            <span class="ep-method ${ep.method}" style="font-size:.6rem;min-width:38px">${ep.method}</span>
            <span class="ep-path">${ep.path.replace(/:(\w+)/g,'{$1}')}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  sb.innerHTML=html;
  return totalEndpoints;
}

}

function renderGroup(groupId){
  const g=groups.find(g=>g.id===groupId);
  if(!g) return;
  const main=document.getElementById('groupView');
  let html=`<h2 class="group-header">${g.label}</h2><p class="group-desc">${g.desc}</p>`;
  g.endpoints.forEach(ep=>{
    const epId=g.id+'--'+ep.method+ep.path.replace(/[:/]/g,'_');
    const isOpen=expandedEndpoints[epId];
    const displayPath = ep.path.replace(/:(\w+)/g,'<span class="param">{$1}</span>');
    html+=`<div class="endpoint-card" id="card-${epId}">
      <div class="ep-header" onclick="toggleEndpoint('${epId}')">
        <span class="ep-method ${ep.method}">${ep.method}</span>
        <span class="ep-path">${displayPath}</span>
        ${authBadge(ep.auth)}
        ${ep.isDisabled?'<span class="ep-auth disabled">Disabled</span>':''}
        <span class="ep-desc-brief">${ep.desc.substring(0,60)}${ep.desc.length>60?'...':''}</span>
      </div>
      <div class="ep-body${isOpen?' open':''}" id="body-${epId}">`;
    // Description
    html+=`<div class="ep-section"><div class="ep-section-title">Description</div><p class="ep-desc">${ep.desc}</p>${authDetailBadge(ep.auth)} ${statusBadge(ep.status)}</div>`;
    // Path params
    if(ep.pathParams&&ep.pathParams.length){
      html+=`<div class="ep-section"><div class="ep-section-title">Param&egrave;tres de chemin</div>
        <table class="params-table"><thead><tr><th>Nom</th><th>Description</th></tr></thead><tbody>${paramRows(ep.pathParams,false)}</tbody></table></div>`;
    }
    // Query params
    if(ep.queryParams&&ep.queryParams.length){
      html+=`<div class="ep-section"><div class="ep-section-title">Param&egrave;tres de requ&ecirc;te</div>
        <table class="params-table"><thead><tr><th>Nom</th><th>Type</th><th>Description</th></tr></thead><tbody>${paramRows(ep.queryParams,false)}</tbody></table></div>`;
    }
    // Body params
    if(ep.bodyParams&&ep.bodyParams.length){
      html+=`<div class="ep-section"><div class="ep-section-title">Corps de la requ&ecirc;te</div>
        <table class="params-table"><thead><tr><th>Nom</th><th>Type</th><th>Requis</th><th>Description</th></tr></thead><tbody>${paramRows(ep.bodyParams,true)}</tbody></table></div>`;
    }
    // Note
    if(ep.note){
      html+=`<div class="ep-section"><div class="ep-section-title">Note</div><p class="ep-desc" style="color:var(--accent)">${ep.note}</p></div>`;
    }
    // Request example
    if(ep.reqExample){
      html+=`<div class="ep-section"><div class="ep-section-title">Exemple de requ&ecirc;te</div>
        <div class="code-block"><div class="code-block-header"><span>${ep.method} ${ep.path.replace(/:(\w+)/g,'{$1}')}</span><button class="copy-btn" onclick="copyCode(this)">Copier</button></div><pre>${syntaxHighlight(ep.reqExample)}</pre></div></div>`;
    }
    // Response example
    if(ep.resExample){
      html+=`<div class="ep-section"><div class="ep-section-title">R&eacute;ponse ${statusBadge(ep.status)}</div>
        <div class="code-block"><div class="code-block-header"><span>application/json</span><button class="copy-btn" onclick="copyCode(this)">Copier</button></div><pre>${syntaxHighlight(ep.resExample)}</pre></div></div>`;
    }
    html+=`</div></div>`;
  });
  main.innerHTML=html;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function toggleGroup(gid){
  collapsedGroups[gid]=!collapsedGroups[gid];
  const filter=document.getElementById('searchInput').value;
  renderSidebar(filter);
}
function toggleEndpoint(epId){
  expandedEndpoints[epId]=!expandedEndpoints[epId];
  const body=document.getElementById('body-'+epId);
  if(body) body.classList.toggle('open');
}
function selectEndpoint(gid,epId){
  if(activeGroup!==gid){
    activeGroup=gid;
    renderGroup(gid);
    document.getElementById('welcomeView').style.display='none';
    document.getElementById('groupView').style.display='block';
  }
  activeEndpoint=epId;
  expandedEndpoints[epId]=true;
  const filter=document.getElementById('searchInput').value;
  renderSidebar(filter);
  // Re-render group to update expanded state
  renderGroup(gid);
  // Scroll to endpoint
  setTimeout(()=>{
    const card=document.getElementById('card-'+epId);
    if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
  },50);
  // Close mobile sidebar
  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
}
function filterEndpoints(val){
  const count=renderSidebar(val);
  // If only one group matches, auto-select it
  const matchingGroups=groups.filter(g=>g.endpoints.some(ep=>{
    const f=val.toLowerCase();
    return !f||ep.path.toLowerCase().includes(f)||ep.desc.toLowerCase().includes(f)||ep.method.toLowerCase().includes(f)||g.label.toLowerCase().includes(f);
  }));
  if(matchingGroups.length===1&&val){
    const gid=matchingGroups[0].id;
    if(activeGroup!==gid){
      activeGroup=gid;
      renderGroup(gid);
      document.getElementById('welcomeView').style.display='none';
      document.getElementById('groupView').style.display='block';
    }
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderSidebar();
renderWelcome();
</script>
